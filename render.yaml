# render.yaml — Render Blueprint
# On every git push to main, Render rebuilds and redeploys automatically.

services:
  - type: web
    name: be-todo
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: ./JigdenShakya_02240343_DSO101_A1/backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: todo-db
          property: connectionString
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        fromService:
          name: fe-todo
          type: web
          property: host

  - type: web
    name: fe-todo
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: ./JigdenShakya_02240343_DSO101_A1/frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: be-todo
          type: web
          property: host

databases:
  - name: todo-db
    plan: free
    databaseName: todo_db
    user: todo_db_0lmo_user