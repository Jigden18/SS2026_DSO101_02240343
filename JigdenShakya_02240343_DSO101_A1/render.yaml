  - type: web
    name: be-todo
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        value: postgresql://todo_db_0lmo_user:PtZoowQdGtYB2Ydz8ozyCXmmWsUBwWEn@dpg-d6rb1q9j16oc73f48tgg-a.singapore-postgres.render.com/todo_db_0lmo
