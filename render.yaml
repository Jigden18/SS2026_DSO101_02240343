# render.yaml — Render Blueprint
# This file tells Render how to build and deploy all services.
# On every git push to main, Render rebuilds and redeploys automatically.

services:
  # BACKEND 
  - type: web
    name: be-todo
    env: docker
    dockerfilePath: ./JigdenShakya_02240343_DSO101_A1/backend/Dockerfile
    dockerContext: ./JigdenShakya_02240343_DSO101_A1/backend
    plan: free
    envVars:
      # DATABASE_URL is auto-injected from the todo-db database below.
      - key: DATABASE_URL
        fromDatabase:
          name: todo-db
          property: connectionString
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      # FRONTEND_URL is auto-wired from the fe-todo service URL.
      - key: FRONTEND_URL
        fromService:
          name: fe-todo
          type: web
          property: host

  # FRONTEND 
  - type: web
    name: fe-todo
    env: docker
    dockerfilePath: ./JigdenShakya_02240343_DSO101_A1/frontend/Dockerfile
    dockerContext: ./JigdenShakya_02240343_DSO101_A1/frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: be-todo
          type: web
          property: host

# DATABASE 
databases:
  - name: todo-db
    plan: free
    databaseName: todo_db
    user: postgres